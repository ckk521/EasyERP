server:
  port: 8081

spring:
  application:
    name: easy-erp-system
  datasource:
    url: jdbc:mysql://localhost:3306/easy_erp?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: WMS2026SecretKeyForJWTTokenGenerationAndValidation
  expiration: 3600000
  refresh-expiration: 604800000

logging:
  level:
    com.wms: debug
    org.springframework.security: info
